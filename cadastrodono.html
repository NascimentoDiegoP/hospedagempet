<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiAuspedagem</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        /* 
           O banner agora é um container Flex.
           As duas colunas internas dividem o fundo exatamente ao meio.
        */
        .banner {
            display: flex;
            width: 100%;
            font-size: 3.5rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(#00bfff, #8a2be2);
        }

        /* Lado Esquerdo (Roxo) */
        .coluna-esquerda {
            flex: 0.47; /* Ocupa 47% */
            background-color: #8a2be2;
            border-top-right-radius: 15px;
            padding: 40px 0;
            text-align: right; /* Alinha o "Mi" para a direita, encostando no centro */
        }

        /* Lado Direito (Azul) */
        .coluna-direita {
            flex: 0.53; /* Ocupa 53% */
            background-color: #00bfff;
            border-bottom-left-radius: 15px;
            padding: 40px 0;
            text-align: left; /* Alinha o "Auspedagem" para a esquerda, encostando no centro */
        }

        /* Estilização do Menu */
        nav {
            background-color: #333;
            text-align: center;
            font-weight: bold;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }

        nav ul li {
            display: inline-block;
        }

        nav ul li a {
            display: block;
            padding: 15px 25px;
            color: white;
            text-decoration: none;
            transition: background 0.3s;
        }

        nav ul li a:hover {
            background-color: #C9A227;
            color: black;
        }

        .conteudo {
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            min-height: 500px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    
        /* Importante: permite que o ::before se posicione em relação a este bloco */
            position: relative; 
            overflow: hidden; /* Garante que a imagem não saia das bordas arredondadas */
        }

        /* Criando a marca d'água */
        .conteudo::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('gatoecao.jpg'); 
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain; /* Mantém a imagem inteira dentro do bloco */
            opacity: 0.1; /* Ajuste a transparência: 0.1 é bem sutil, 1.0 é totalmente visível */
            z-index: 0; /* Joga a imagem para trás do texto */
        }

        /* Garante que o texto fique acima da marca d'água */
        .conteudo h2, .conteudo form {
            position: relative;
            z-index: 1;
        }
        input {
            border-radius: 15px;
            width: 500px;
            min-height: 25px;
            min-width: 300px;
        }

        input[type="submit"]{
            border-radius: 15px;
            width: 150px;
            min-height: 25px;
            min-width: 150px;
        }

        input[type="reset"]{
            border-radius: 15px;
            width: 150px;
            min-height: 25px;
            min-width: 150px;
        }

    </style>
</head>
<body>

    <!-- Banner com Divisão Real de 50% -->
    <header class="banner">
        <div class="coluna-esquerda">
            <span>Mi</span>
        </div>
        <div class="coluna-direita">
            <span>Auspedagem</span>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Início</a></li>
            <li><a href="cadastrodono.html">Cadastro Dono</a></li>
            <li><a href="cadastropet.html">Cadastro Pet</a></li>
        </ul>
    </nav>

    <div class="conteudo">
        <form action="/cadastrar" method="post">

            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required minlength="3" maxlength="50">
            <br><br>

            <label for="cpf">CPF:</label>
            <input type="number" id="cpf" name="cpf" required>
            <br><br>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required minlength="6">
            <br><br>

            <label for="telefone">Telefone:</label>
            <input type="number" id="telefone" name="telefone">
            <br><br>

            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="exemplo@dominio.com">
            <br><br>

            <label for="banco">Banco:</label>
            <input type="text" id="banco" name="banco" placeholder="Nome do Banco" minlength="3" maxlength="50">
            <br><br>

            <label for="agencia">Agencia:</label>
            <input type="text" id="agencia" name="agencia" placeholder="Nº Agencia" minlength="4" maxlength="6">
            <br><br>

            <label for="conta">Conta:</label>
            <input type="text" id="conta" name="conta" placeholder="Nº Conta" minlength="3" maxlength="15">
            <br><br>

            <input type="submit" width ="100" value="Cadastrar">
            <input type="reset" width ="100" value="Limpar">

        </form>
    </div>
</body>
</html>
